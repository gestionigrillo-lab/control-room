<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           script-src 'self' 'unsafe-inline';
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           font-src https://fonts.gstatic.com;
           connect-src 'self'
             https://control-room-production-8173.up.railway.app
             https://studiolegalegrillo.netlify.app
             https://www.gestioni-immobiliari.eu
             https:;
           img-src 'self' data: https:;
           frame-ancestors 'none';
           base-uri 'self';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="no-referrer">
<title>Studio Grillo — AI Control Room v8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── RESET ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,input,select,textarea{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}

/* ── TOKENS ─────────────────────────────────────────────────────── */
:root{
  --bg:#080b0f; --bg2:#0d1117; --bg3:#131922;
  --panel:#111827; --panel2:#1a2235;
  --brd:rgba(255,255,255,.08); --brd2:rgba(255,255,255,.14);
  --txt:#e2e8f0; --txt2:#94a3b8; --txt3:#64748b;
  --gold:#f0a500; --gold2:#fbbf24;
  --grn:#10b981; --rose:#f43f5e; --amb:#f59e0b; --teal:#14b8a6;
  --gnlt:rgba(16,185,129,.1); --roslt:rgba(244,63,94,.1); --amblt:rgba(245,158,11,.1);
  --r:12px; --rsm:8px;
  --shadow:0 14px 50px rgba(0,0,0,.35);
  --sidebar:220px; --hdr:54px;
}
body{
  font-family:'Barlow',sans-serif;
  background:radial-gradient(circle at top,rgba(240,165,0,.05),transparent 30%),var(--bg);
  color:var(--txt); overflow:hidden; height:100vh;
}

/* ── SCROLLBAR ──────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
.shell{display:grid;grid-template-rows:var(--hdr) 1fr;height:100vh}
.body{display:grid;grid-template-columns:var(--sidebar) 1fr;overflow:hidden;height:calc(100vh - var(--hdr))}

/* ── HEADER ─────────────────────────────────────────────────────── */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--brd2);
  display:flex;align-items:center;padding:0 20px;gap:16px;
  position:relative;z-index:300;
}
.hdr-brand{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--txt2)}
.hdr-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-left:2px}
.hdr-mid{flex:1}
.hdr-badge{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:20px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
}
.hdr-ok{background:var(--gnlt);border:1px solid rgba(16,185,129,.3);color:var(--grn)}
.hdr-warn{background:var(--amblt);border:1px solid rgba(245,158,11,.3);color:var(--amb)}
.hdr-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--txt3)}
.btn-logout{
  padding:5px 12px;border:1px solid rgba(244,63,94,.3);background:rgba(244,63,94,.08);
  border-radius:var(--rsm);font-family:'Barlow Condensed',sans-serif;font-size:10px;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--rose);cursor:pointer;
}
.btn-logout:hover{background:rgba(244,63,94,.18)}
.demo-banner{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:#b45309;color:#fff;padding:5px 16px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;
  font-weight:700;letter-spacing:1px;text-align:center;text-transform:uppercase;
}

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
.sb{
  background:var(--bg2);border-right:1px solid var(--brd);
  overflow-y:auto;padding:12px 0 60px;
}
.sb-lbl{
  padding:16px 16px 6px;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);
  font-family:'Barlow Condensed',sans-serif;
}
.sb-btn{
  width:100%;display:flex;align-items:center;gap:9px;
  padding:9px 16px;background:none;border:none;border-left:3px solid transparent;
  cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);
  transition:all .15s;text-align:left;
}
.sb-btn:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.sb-btn.on{color:var(--gold);border-left-color:var(--gold);background:rgba(240,165,0,.07)}
.sb-ico{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.sb-count{
  margin-left:auto;padding:1px 6px;border-radius:8px;
  font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
  background:rgba(244,63,94,.15);color:var(--rose);border:1px solid rgba(244,63,94,.3);
}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--grn);box-shadow:0 0 5px rgba(16,185,129,.5)}
.dot-err{background:var(--rose)}
.dot-warn{background:var(--amb)}
.dot-pend{background:var(--txt3)}

/* ── MAIN ────────────────────────────────────────────────────────── */
.main{overflow-y:auto;height:100%}
.pg{display:none;padding:20px 24px 80px;animation:fadeIn .2s ease}
.pg.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.pg-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1}
.pg-sub{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--txt3);font-family:'Barlow Condensed',sans-serif;margin-top:4px}

/* ── GRID ────────────────────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}

/* ── PANEL ───────────────────────────────────────────────────────── */
.panel{background:var(--panel);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.panel-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--panel2);border-bottom:1px solid var(--brd);
}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3)}
.panel-body{padding:14px}

/* ── KPI ─────────────────────────────────────────────────────────── */
.kpi{background:var(--panel);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px}
.kpi-n{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1}
.kpi-l{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--txt3);font-family:'Barlow Condensed',sans-serif;margin-top:3px}

/* ── AGENT ROW ───────────────────────────────────────────────────── */
.ag-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:1px solid var(--brd);font-size:12px}
.ag-row:last-child{border-bottom:none}
.ag-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;font-size:11px;flex:1}
.ag-lat{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt3)}
.ag-link{padding:3px 8px;border:1px solid var(--brd2);border-radius:4px;
  font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
  color:var(--txt3);cursor:pointer;background:rgba(255,255,255,.04)}
.ag-link:hover{border-color:var(--gold);color:var(--gold)}

/* ── APPROVAZIONI ────────────────────────────────────────────────── */
.app-item{
  background:var(--panel);border:1px solid var(--brd);border-left:3px solid var(--amb);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;
}
.app-item[data-prio="alta"]{border-left-color:var(--rose)}
.app-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.02)}
.app-author{font-size:13px;font-weight:600;flex:1}
.app-agent{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;
  background:var(--amblt);color:var(--amb);border:1px solid rgba(245,158,11,.3)}
.app-txt{
  margin:0 14px 8px;padding:10px 13px;background:rgba(255,255,255,.03);
  border:1px solid var(--brd);border-radius:var(--rsm);font-size:12px;color:var(--txt2);
  line-height:1.65;min-height:40px;outline:none;
  font-family:'Barlow',sans-serif;resize:vertical;
}
.app-acts{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--brd)}
.app-ok{padding:11px;border:none;cursor:pointer;
  background:var(--gnlt);color:var(--grn);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;transition:background .15s}
.app-ok:hover{background:rgba(16,185,129,.2)}
.app-no{padding:11px;border:none;border-left:1px solid var(--brd);cursor:pointer;
  background:var(--roslt);color:var(--rose);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;transition:background .15s}
.app-no:hover{background:rgba(244,63,94,.2)}

/* ── LOG ─────────────────────────────────────────────────────────── */
.log-item{display:flex;align-items:center;gap:9px;padding:6px 14px;
  border-bottom:1px solid var(--brd);font-size:11px}
.log-item:hover{background:rgba(255,255,255,.02)}
.log-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--txt3);width:72px;flex-shrink:0}
.log-tag{padding:1px 6px;border-radius:4px;font-size:9px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;flex-shrink:0;text-transform:uppercase}
.lt-ok{background:var(--gnlt);color:var(--grn)} .lt-err{background:var(--roslt);color:var(--rose)}
.lt-warn{background:var(--amblt);color:var(--amb)} .lt-info{background:rgba(59,130,246,.1);color:#60a5fa}
.lt-pend{background:rgba(255,255,255,.06);color:var(--txt3)}
.log-msg{flex:1;color:var(--txt2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ── SOCIAL ──────────────────────────────────────────────────────── */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:14px}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--txt3);transition:all .15s}
.tab:hover{color:var(--txt2)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none} .tab-pane.on{display:block}
.plt-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.plt-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--brd2);
  background:rgba(255,255,255,.04);font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--txt3);cursor:pointer;transition:all .15s}
.plt-btn.sel-li{background:rgba(10,102,194,.2);border-color:#3b9dd8;color:#3b9dd8}
.plt-btn.sel-ig{background:rgba(193,53,132,.2);border-color:#e1306c;color:#e1306c}
.plt-btn.sel-fb{background:rgba(24,119,242,.2);border-color:#4a9cff;color:#4a9cff}
.plt-btn.sel-x{background:rgba(255,255,255,.1);border-color:#ccc;color:#ccc}
.draft-card{background:var(--panel);border:1px solid var(--brd);border-radius:var(--r);
  padding:12px 14px;margin-bottom:8px;font-size:12px}
.draft-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.draft-txt{color:var(--txt2);line-height:1.65;margin-bottom:8px}
.draft-acts{display:flex;gap:6px}

/* ── ENGAGEMENT ──────────────────────────────────────────────────── */
.eng-opp{
  background:var(--panel);border:1px solid var(--brd);border-left:3px solid var(--teal);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;
}
.eng-opp-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.02)}
.eng-opp-author{font-size:13px;font-weight:600;flex:1}
.eng-opp-post{
  margin:0 14px 0;padding:9px 12px;background:rgba(255,255,255,.03);
  border:1px solid var(--brd);border-radius:var(--rsm);font-size:12px;
  color:var(--txt2);line-height:1.6;font-style:italic;
}
.eng-opp-reply-lbl{
  padding:8px 14px 2px;font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;
}
.eng-opp-reply{
  margin:0 14px 8px;padding:10px 13px;
  background:rgba(20,184,166,.05);border:1px solid rgba(20,184,166,.15);
  border-radius:var(--rsm);font-size:12px;color:var(--txt);line-height:1.65;
}
.eng-opp-acts{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--brd)}
.eng-btn{padding:10px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;transition:background .15s}
.eng-btn-ok{background:rgba(20,184,166,.1);color:var(--teal)}
.eng-btn-ok:hover{background:rgba(20,184,166,.2)}
.eng-btn-no{background:var(--roslt);color:var(--rose);border-left:1px solid var(--brd)}
.eng-btn-no:hover{background:rgba(244,63,94,.18)}
.eng-btn-regen{background:rgba(168,85,247,.08);color:#a855f7;border-left:1px solid var(--brd)}
.eng-btn-regen:hover{background:rgba(168,85,247,.18)}
.prof-card{
  background:var(--panel);border:1px solid var(--brd);border-radius:var(--r);
  padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
}
.prof-av{width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal),#a855f7);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.prof-info{flex:1;min-width:0}
.prof-name{font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.prof-handle{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt3)}

/* ── SITI ────────────────────────────────────────────────────────── */
.sito-card{background:var(--panel);border:1px solid var(--brd);border-radius:var(--r);
  padding:16px;margin-bottom:14px}
.sito-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sito-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.5px;flex:1}
.sito-url{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt3);margin-bottom:8px}
.sito-status{font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.5px;text-transform:uppercase}
.sito-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.sito-m{background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:var(--rsm);
  padding:7px;text-align:center}
.sito-mv{font-family:'DM Mono',monospace;font-size:13px}
.sito-ml{font-size:8px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.sito-bar{height:3px;background:var(--bg3);border-radius:2px;margin:8px 0;overflow:hidden}
.sito-bar-fill{height:100%;background:var(--grn);transition:width .5s}
.sito-acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

/* ── API CONFIG ──────────────────────────────────────────────────── */
.api-card{background:var(--panel);border:1px solid var(--brd);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden}
.api-card-hd{display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid var(--brd);cursor:pointer;transition:background .15s}
.api-card-hd:hover{background:rgba(255,255,255,.03)}
.api-card-ico{font-size:20px;flex-shrink:0}
.api-card-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.5px;flex:1}
.api-card-desc{font-size:10px;color:var(--txt3);margin-top:1px}
.api-badge{padding:2px 9px;border-radius:12px;font-size:9px;font-weight:700;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.ab-missing{background:rgba(100,116,139,.1);color:var(--txt3);border:1px solid rgba(100,116,139,.2)}
.ab-cfg{background:var(--amblt);color:var(--amb);border:1px solid rgba(245,158,11,.3)}
.ab-ok{background:var(--gnlt);color:var(--grn);border:1px solid rgba(16,185,129,.3)}
.api-card-body{display:none;padding:14px 16px;border-top:1px solid var(--brd)}
.api-card-body.open{display:block}
.api-field{margin-bottom:11px}
.api-lbl{display:block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--txt3);font-family:'Barlow Condensed',sans-serif;margin-bottom:5px}
.api-inp{
  width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--rsm);
  padding:8px 11px;font-family:'DM Mono',monospace;font-size:11px;color:var(--txt);
  outline:none;transition:border-color .15s;
}
.api-inp:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(240,165,0,.08)}
.api-inp::placeholder{color:var(--txt3)}
.api-inp-row{display:grid;grid-template-columns:1fr auto;gap:5px;align-items:end}
.api-note{font-size:10px;color:var(--txt3);margin-top:4px;line-height:1.5}
.api-note a{color:var(--gold)}
.api-test-result{margin-top:10px;padding:7px 11px;border-radius:var(--rsm);
  font-size:11px;display:none;line-height:1.5}
.atr-ok{background:var(--gnlt);border:1px solid rgba(16,185,129,.3);color:var(--grn)}
.atr-fail{background:var(--roslt);border:1px solid rgba(244,63,94,.3);color:var(--rose)}
.atr-warn{background:var(--amblt);border:1px solid rgba(245,158,11,.3);color:var(--amb)}

/* ── BOTTONI ─────────────────────────────────────────────────────── */
.btn{
  padding:7px 16px;border-radius:var(--rsm);border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;transition:all .15s;
}
.btn-gold{background:var(--gold);color:#0a0e14}
.btn-gold:hover{background:var(--gold2)}
.btn-sec{background:rgba(255,255,255,.07);border:1px solid var(--brd2);color:var(--txt2)}
.btn-sec:hover{background:rgba(255,255,255,.12)}
.btn-grn{background:var(--gnlt);border:1px solid rgba(16,185,129,.3);color:var(--grn)}
.btn-grn:hover{background:rgba(16,185,129,.2)}
.btn-rose{background:var(--roslt);border:1px solid rgba(244,63,94,.3);color:var(--rose)}
.btn-rose:hover{background:rgba(244,63,94,.18)}
.btn-teal{background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.3);color:var(--teal)}
.btn-teal:hover{background:rgba(20,184,166,.2)}
.btn-sm{padding:5px 11px;font-size:10px}

/* ── INPUT / TEXTAREA ────────────────────────────────────────────── */
.inp{
  width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--rsm);
  padding:8px 11px;font-size:12px;color:var(--txt);outline:none;transition:border-color .15s;
}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--txt3)}
.sel{
  background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--rsm);
  padding:8px 11px;font-size:12px;color:var(--txt);outline:none;cursor:pointer;
}
textarea.inp{resize:vertical;min-height:100px;line-height:1.6;font-family:'Barlow',sans-serif}

/* ── INLINE KPI ──────────────────────────────────────────────────── */
.ikpi{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px}

const $ = id => document.getElementById(id);
const mk = (tag, cls, text) => {
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text !== undefined) e.textContent = text;
  return e;
};
const clr = el => { while(el.firstChild) el.removeChild(el.firstChild); };
// sanitize: usa textContent per sicurezza (no innerHTML)
const fmt = d => new Date(d).toLocaleTimeString('it-IT');
const now = () => new Date().toISOString();

function esc(v) {
  const s = String(v ?? '');
  const safe = /^[=+\-@]/.test(s) ? `'${s}` : s;
  return `"${safe.replaceAll('"','""')}"`;
}

function toast(msg) {
  const t = $('app-toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

function addLog(area, lvl, msg) {
  S.logs.unshift({ area, lvl, msg, ts: now() });
  if(S.logs.length > 100) S.logs.pop();
  if(S.page === 'log') renderLog();
}

function addAudit(action, target, outcome, detail) {
  const entry = { action, target, outcome, detail: detail||'', ts: now() };
  S.audit.unshift(entry);
  if(S.audit.length > 200) S.audit.pop();
  saveAudit();
  if(S.page === 'audit') renderAudit();
}

function saveAudit() {
  try { localStorage.setItem(AUDIT_KEY, JSON.stringify(S.audit.slice(0,200))); } catch {}
}

function loadAudit() {
  try { const r = localStorage.getItem(AUDIT_KEY); if(r) S.audit = JSON.parse(r); } catch {}
}

function saveApiCfg() {
  try { localStorage.setItem(API_KEY, JSON.stringify(S.apiCfg)); } catch {}

}

// ── SHA-256 ──────────────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── LOCKOUT ───────────────────────────────────────────────────────────
function getLockout() {
  try {
    const r = sessionStorage.getItem(LOCKOUT_KEY);
    return r ? JSON.parse(r) : { until:0, attempts:0 };
  } catch { return { until:0, attempts:0 }; }
}
function saveLockout(until, attempts) {
  try { sessionStorage.setItem(LOCKOUT_KEY, JSON.stringify({ until, attempts })); } catch {}
}
function resetLockout() {
  try { sessionStorage.removeItem(LOCKOUT_KEY); } catch {}
}

// ── SESSION ───────────────────────────────────────────────────────────
function startSession() {
  S.auth = true;
  S.sessionExp = Date.now() + TIMEOUT_MIN * 60 * 1000;
  S.warnShown = false;
  try {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ exp: S.sessionExp }));
  } catch {}
}

function loadSession() {
  try {
    const r = sessionStorage.getItem(SESSION_KEY);
    if(!r) return false;
    const { exp } = JSON.parse(r);
    if(exp > Date.now()) { S.auth = true; S.sessionExp = exp; return true; }
  } catch {}
  return false;
}

function touchSession() {
  if(!S.auth) return;
  S.sessionExp = Date.now() + TIMEOUT_MIN * 60 * 1000;
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ exp: S.sessionExp })); } catch {}
}

function endSession() {
  S.auth = false;
  try { sessionStorage.removeItem(SESSION_KEY); } catch {}
  addAudit('LOGOUT','Control Room','OK','Sessione terminata');
  addLog('auth','ok','Logout');
  showLogin();
}

// ── LOGIN ─────────────────────────────────────────────────────────────
function showLogin() {
  document.body.innerHTML = `
    <div class="login-shell" id="login-shell">
      <div class="login-card">
        <div class="login-brand">STUDIO GRILLO</div>
        <div class="login-sub">AI Control Room · Accesso Sicuro</div>
        <div class="pin-dots" id="pin-dots">
          ${[0,1,2,3,4,5].map(i => `<div class="pin-dot" id="pd${i}"></div>`).join('')}
        </div>
        <div class="pin-grid" id="pin-grid"></div>
        <div class="pin-err" id="pin-err"></div>
        <div class="pin-attempt" id="pin-att"></div>
      </div>
    </div>
    <div class="toast" id="app-toast"></div>
  `;
  buildPinGrid();
  checkLockoutDisplay();
}

function buildPinGrid() {
  const grid = $('pin-grid');
  if(!grid) return;
  S.pin = '';
  [1,2,3,4,5,6,7,8,9,'C',0,'✓'].forEach(k => {
    const b = mk('button', `pin-btn${k==='✓'?' pin-btn-ok':''}`, String(k));
    b.type = 'button';
    b.addEventListener('click', () => handlePinKey(k));
    grid.appendChild(b);
  });
}

function updateDots() {
  for(let i=0;i<6;i++) {
    const d = $(`pd${i}`);
    if(d) d.className = `pin-dot${i < S.pin.length ? ' filled' : ''}`;
  }
}

function checkLockoutDisplay() {
  const lk = getLockout();
  if(lk.until > Date.now()) {
    const s = Math.ceil((lk.until - Date.now()) / 1000);
    const err = $('pin-err');
    if(err) err.textContent = `Bloccato. Riprova tra ${s}s`;
  }
}

async function handlePinKey(k) {
  const err = $('pin-err'); const att = $('pin-att');
  if(err) err.textContent = '';
  if(att) att.textContent = '';

  const lk = getLockout();
  if(lk.until > Date.now()) {
    const s = Math.ceil((lk.until - Date.now()) / 1000);
    if(err) err.textContent = `Bloccato per altri ${s}s`;
    return;
  }

  if(k === 'C') {
    S.pin = S.pin.slice(0, -1);
    updateDots();
    return;
  }
  if(k === '✓' || S.pin.length === 6) {
    if(k !== '✓' && S.pin.length < 6) { S.pin += String(k); updateDots(); }
    await submitPin();
    return;
  }
  if(S.pin.length < 6) {
    S.pin += String(k);
    updateDots();
    if(S.pin.length === 6) await submitPin();
  }
}

async function submitPin() {
  const hash = await sha256(S.pin);
  S.pin = '';
  updateDots();

  if(hash === PIN_HASH) {
    resetLockout();
    startSession();
    addAudit('LOGIN','Control Room','OK','Accesso riuscito');
    addLog('auth','ok','Sessione avviata');
    buildApp();
  } else {
    const lk = getLockout();
    const newAtt = lk.attempts + 1;
    if(newAtt >= MAX_ATTEMPTS) {
      const until = Date.now() + 5 * 60 * 1000;
      saveLockout(until, 0);
      const err = $('pin-err');
      if(err) err.textContent = 'Troppi tentativi. Bloccato 5 minuti.';
      addAudit('LOGIN','Control Room','KO','Lockout attivato');
    } else {
      saveLockout(0, newAtt);
      const err = $('pin-err');
      if(err) err.textContent = `PIN errato. Tentativi rimasti: ${MAX_ATTEMPTS - newAtt}`;
      const att = $('pin-att');
      if(att) att.textContent = '';
    }
    addLog('auth','err','PIN errato');
    toast('Accesso negato');
  }
}

// ── NAVIGAZIONE ───────────────────────────────────────────────────────
function go(pageId) {
  S.page = pageId;
  touchSession();
  // Attiva pagina
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  const pg = $(`pg-${pageId}`);
  if(pg) pg.classList.add('on');
  // Attiva nav
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('on'));
  const nav = $(`nav-${pageId}`);
  if(nav) nav.classList.add('on');
  // Render specifico
  switch(pageId) {
    case 'cr':     renderCR(); break;
    case 'coda':   renderCoda(); break;
    case 'log':    renderLog(); break;
    case 'social': renderSocialPage(); break;
    case 'eng':    renderEngPage(); break;
    case 'siti':   renderSitiPage(); setTimeout(pingAll, 300); break;
    case 'audit':  renderAudit(); break;
    case 'apiconf':renderApiConf(); break;
  }
  if(pageId.startsWith('agent-')) renderAgentPage(pageId.replace('agent-',''));
}

function switchSocialTab(tab) {
  S.socialTab = tab;
  document.querySelectorAll('#pg-social .tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('#pg-social .tab-pane').forEach(p => p.classList.remove('on'));
  const tabEl = document.getElementById(`stab-${tab}`);
  const paneEl = document.getElementById(`sp-${tab}`);
  if(tabEl) tabEl.classList.add('on');
  if(paneEl) paneEl.classList.add('on');
  if(tab === 'cal') renderPianoCal();
  if(tab === 'stats') renderSocialStats();
}

function switchEngTab(tab) {
  document.querySelectorAll('#pg-eng .tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('#pg-eng .tab-pane').forEach(p => p.classList.remove('on'));
  const tabEl = document.getElementById(`etab-${tab}`);
  const paneEl = document.getElementById(`ep-${tab}`);
  if(tabEl) tabEl.classList.add('on');
  if(paneEl) paneEl.classList.add('on');
}

// ── BIND EVENTS ───────────────────────────────────────────────────────
function bindEvents() {
  // Logout
  $('btn-logout')?.addEventListener('click', endSession);
  // Navigazione sidebar
  ['cr','coda','log','social','eng','siti','audit','apiconf'].forEach(id =>
    $(`nav-${id}`)?.addEventListener('click', () => go(id))
  );
  AGENTI.forEach(a =>
    $(`nav-agent-${a.id}`)?.addEventListener('click', () => go(`agent-${a.id}`))
  );
  // CR buttons
  $('btn-ping-all')?.addEventListener('click', pingAgenti);
  // Coda
  $('btn-approva-tutti')?.addEventListener('click', approvaTutti);
  // Log
  $('btn-clear-log')?.addEventListener('click', () => { S.logs = []; renderLog(); });
  // Social tabs
  $('stab-bozze')?.addEventListener('click', () => switchSocialTab('bozze'));
  $('stab-comp')?.addEventListener('click', () => switchSocialTab('comp'));
  $('stab-cal')?.addEventListener('click', () => switchSocialTab('cal'));
  $('stab-stats')?.addEventListener('click', () => switchSocialTab('stats'));
  $('btn-social-refresh')?.addEventListener('click', () => { caricaSocial(); toast('↺ Aggiornamento…'); });
  // Social composer
  $('plt-picker')?.addEventListener('click', e => {
    const btn = e.target.closest('[data-plt]');
    if(!btn) return;
    const pid = btn.dataset.plt;
    if(S.selectedPlt.has(pid)) S.selectedPlt.delete(pid);
    else S.selectedPlt.add(pid);
    document.querySelectorAll('[data-plt]').forEach(b => {
      const p = PIATTAFORME.find(x => x.id === b.dataset.plt);
      b.className = `plt-btn${S.selectedPlt.has(b.dataset.plt) ? ` sel-${p.cls}` : ''}`;
    });
  });
  $('comp-ai-btn')?.addEventListener('click', generaPostAI);
  $('comp-save-btn')?.addEventListener('click', salvaBozza);
  $('comp-use-btn')?.addEventListener('click', () => {
    const txt = $('comp-ai-txt')?.textContent || '';
    const ta = $('comp-text'); if(ta) ta.value = txt;
    $('comp-ai-out')?.style && ($('comp-ai-out').style.display='none');
  });
  // Engagement tabs
  $('etab-opp')?.addEventListener('click', () => switchEngTab('opp'));
  $('etab-profili')?.addEventListener('click', () => switchEngTab('profili'));
  $('etab-add')?.addEventListener('click', () => switchEngTab('add'));
  $('btn-eng-scan')?.addEventListener('click', async () => {
    toast('🔍 Scansione in corso…');
    addLog('eng','ok','Scansione hashtag avviata');
    await new Promise(r=>setTimeout(r,1500));
    toast('✅ Scansione completata');
    addLog('eng','ok','Scansione completata');
  });
  $('btn-add-prof')?.addEventListener('click', aggiungiProfilo);
  // Siti
  $('btn-verifica-siti')?.addEventListener('click', pingAll);
  // Link esterni con data-ext
  document.addEventListener('click', e => {
    const extBtn = e.target.closest('[data-ext="1"]');
    if(extBtn && extBtn.dataset.url) { window.open(extBtn.dataset.url,'_blank','noopener,noreferrer'); }
  });
  // Siti — delegazione click su "Verifica" e "Apri sito"
  $('pg-siti')?.addEventListener('click', e => {
    const checkBtn = e.target.closest('[data-id]');
    if(checkBtn && checkBtn.classList.contains('btn-sito-check')) { pingSito(checkBtn.dataset.id); return; }
    const openBtn = e.target.closest('[data-url]');
    if(openBtn && openBtn.classList.contains('btn-open-sito')) { window.open(openBtn.dataset.url,'_blank','noopener,noreferrer'); }
  });
  // Audit
  $('btn-export-audit')?.addEventListener('click', esportaAudit);
  // API Config — delegazione
  document.getElementById('pg-apiconf')?.addEventListener('click', e => {
    // Toggle card
    const hd = e.target.closest('[id^="api-hd-"]');
    if(hd) { const id=hd.id.replace('api-hd-',''); const b=$(`api-body-${id}`); if(b) b.classList.toggle('open'); return; }
    // Toggle field visibility
    const vis = e.target.closest('[data-toggle-field]');
    if(vis) { const f=$(vis.dataset.toggleField); if(f) f.type=f.type==='password'?'text':'password'; return; }
    // Salva
    const save = e.target.closest('[data-api-save]');
    if(save) { salvaApiPlt(save.dataset.apiSave); return; }
    // Test
    const test = e.target.closest('[data-api-test]');
    if(test) { testApiPlt(test.dataset.apiTest); }
  });
  // Agent ping
  document.addEventListener('click', e => {
    const pingBtn = e.target.closest('[data-agent-ping]');
    if(pingBtn) pingAgente(pingBtn.dataset.agentPing, true);
  });
  // CMD bar
  $('cmd-send')?.addEventListener('click', inviaCmd);
  $('cmd-inp')?.addEventListener('keydown', e => { if(e.key==='Enter') inviaCmd(); });
  // Session touch on activity
  ['click','keydown','touchstart'].forEach(ev =>
    document.addEventListener(ev, touchSession, { passive:true })
  );
}

// ── RENDER FUNCTIONS ──────────────────────────────────────────────────

function renderCR() {
  // KPI
  const k = [
    [S.approvazioni.length, 'Approvazioni', 'cr-k1'],
    [S.socialDrafts.length, 'Bozze Social', 'cr-k2'],
    [S.engOpps.length, 'Eng. Opportunità', 'cr-k3'],
    [S.engProfiles.filter(p=>p.monitora).length, 'Profili attivi', 'cr-k4'],
  ];
  k.forEach(([v,l,id]) => {
    const n = $(id); const lb = $(`${id}-l`);
    if(n) n.textContent = v;
    if(lb) lb.textContent = l;
  });
  // Brief
  if($('br-app')) $('br-app').textContent = S.approvazioni.length;
  if($('br-prof')) $('br-prof').textContent = S.engProfiles.filter(p=>p.monitora).length;

async function pingSito(id) {
  const cfg = SITI[id];
  if(!cfg) return;
  const dot = $(`dot-${id}`);
  const statusEl = $(`status-${id}`);
  const pingEl = $(`ping-${id}`);
  const uptimeEl = $(`uptime-${id}`);
  const barEl = $(`bar-${id}`);

  if(dot) dot.className = 'sb-dot dot-warn';
  if(statusEl){ statusEl.textContent='Verifica…'; statusEl.style.color='var(--amb)'; }

  let online = false, pingMs = null;

  // DOPPIO APPROCCIO: fetch no-cors + Image() fallback in parallelo
  try {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 5000);
    const t0 = performance.now();
    // fetch no-cors — per HTTPS→HTTPS funziona sempre
    await fetch(cfg.url, { method:'HEAD', mode:'no-cors', cache:'no-cache', signal: ctrl.signal });
    clearTimeout(to);
    online = true;
    pingMs = Math.round(performance.now() - t0);
  } catch(e) {
    // Fallback: Image() — bypassa connect-src CSP, usa img-src
    try {
      online = await new Promise((resolve) => {
        const t0 = performance.now();
        const img = new Image();
        const to = setTimeout(() => { img.src=''; resolve(false); }, 5000);
        img.onload = img.onerror = () => {
          clearTimeout(to);
          pingMs = Math.round(performance.now() - t0);
          resolve(true);
        };
        img.src = cfg.url + '/favicon.ico?_cb=' + Date.now();
      });
    } catch { online = false; }
  }

  // Aggiorna uptime history
  if(!S.siteUptime[id]) S.siteUptime[id] = [];
  S.siteUptime[id].push(online);
  if(S.siteUptime[id].length > 20) S.siteUptime[id].shift();
  const pct = S.siteUptime[id].length
    ? Math.round(S.siteUptime[id].filter(Boolean).length / S.siteUptime[id].length * 100)
    : 0;

  // Aggiorna UI
  if(dot) dot.className = `sb-dot ${online?'dot-ok':'dot-err'}`;
  if(statusEl){ statusEl.textContent = online?'ONLINE':'OFFLINE'; statusEl.style.color = online?'var(--grn)':'var(--rose)'; }
  if(pingEl) pingEl.textContent = pingMs ? pingMs+'ms' : '—';
  if(uptimeEl) uptimeEl.textContent = pct+'%';
  if(barEl) barEl.style.width = pct+'%';

  // Log
  appendSitiLog(cfg.nome, online, pingMs);
  addLog('siti', online?'ok':'err', cfg.nome+': '+(online?'ONLINE '+pingMs+'ms':'OFFLINE'));
  if($('siti-updated')) $('siti-updated').textContent = 'Aggiornato '+new Date().toTimeString().slice(0,8);
  return online;
}

async function pingAll() {
  await Promise.all(Object.keys(SITI).map(id => pingSito(id)));
}

function appendSitiLog(nome, online, ping) {
  const cont = $('siti-log');
  if(!cont) return;
  const row = mk('div','log-item');
  row.appendChild(mk('span','log-time', new Date().toTimeString().slice(0,8)));
  row.appendChild(mk('span',`log-tag ${online?'lt-ok':'lt-err'}`, nome.slice(0,8).toUpperCase()));
  row.appendChild(mk('span','log-msg', online?`Raggiungibile · ${ping}ms`:'Non raggiungibile'));
  cont.insertBefore(row, cont.firstChild);
  while(cont.children.length > 40) cont.removeChild(cont.lastChild);
}

// ── AUDIT ─────────────────────────────────────────────────────────────
function renderAudit() {
  const cont = $('audit-list');
  if(!cont) return;
  clr(cont);
  if(!S.audit.length){ cont.appendChild(mk('div','empty','Nessun evento audit')); return; }
  S.audit.forEach(a => {
    const row = mk('div','log-item');
    row.appendChild(mk('span','log-time', a.ts ? new Date(a.ts).toTimeString().slice(0,8) : '--:--:--'));
    const ok = a.outcome === 'OK';
    row.appendChild(mk('span',`log-tag ${ok?'lt-ok':'lt-err'}`, a.action.slice(0,8).toUpperCase()));
    row.appendChild(mk('span','log-msg', `${a.target} — ${a.detail||a.outcome}`));
    cont.appendChild(row);
  });
}

function esportaAudit() {
  const lines = [['ts','action','target','outcome','detail'].map(esc).join(',')];
  S.audit.forEach(a => lines.push([a.ts,a.action,a.target,a.outcome,a.detail||''].map(esc).join(',')));
  const blob = new Blob([lines.join('\n')], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='audit.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('⬇ CSV esportato');
}

// ── API CONFIG ────────────────────────────────────────────────────────
function renderApiConf() {
  // Già renderizzato staticamente — aggiorna i badge
  API_PLT.forEach(plt => {
    const cfg = S.apiCfg[plt.id] || {};
    const hasData = Object.values(cfg).some(v => v && v.length > 3);
    const badge = $(`api-badge-${plt.id}`);
    if(badge){ badge.textContent = hasData?'⚙️ CONFIGURATA':'○ DA CONFIGURARE'; badge.className=`api-badge ${hasData?'ab-cfg':'ab-missing'}`; }
    // Riempie i campi
    plt.fields.forEach(f => {
      const inp = $(`api-${plt.id}-${f.id}`);
      if(inp && cfg[f.id]) inp.value = cfg[f.id];
    });
  });
}

function salvaApiPlt(pltId) {
  const plt = API_PLT.find(p => p.id === pltId);
  if(!plt) return;
  const cfg = {};
  plt.fields.forEach(f => { const v = $(`api-${pltId}-${f.id}`)?.value?.trim(); if(v) cfg[f.id]=v; });
  S.apiCfg[pltId] = cfg;
  saveApiCfg();
  const badge = $(`api-badge-${pltId}`);
  const hasData = Object.values(cfg).some(v => v && v.length>3);
  if(badge){ badge.textContent=hasData?'⚙️ CONFIGURATA':'○ DA CONFIGURARE'; badge.className=`api-badge ${hasData?'ab-cfg':'ab-missing'}`; }
  addAudit('API_SAVE','API Config','OK','Piattaforma: '+pltId);
  addLog('auth','ok','API Config salvata: '+pltId);
  toast(`✅ ${pltId} configurata`);
}

async function testApiPlt(pltId) {
  const res = $(`api-test-${pltId}`);
  if(!res) return;
  res.style.display='block'; res.className='api-test-result atr-warn';
  res.textContent='🔌 Test in corso…';
  await new Promise(r=>setTimeout(r,1200));
  const cfg = S.apiCfg[pltId]||{};
  const hasToken = cfg.token||cfg.pageToken||cfg.bearer;
  if(!hasToken){ res.className='api-test-result atr-fail'; res.textContent='❌ Token mancante — salva prima le credenziali'; return; }
  res.className='api-test-result atr-warn';
  res.textContent='⚠️ Credenziali salvate. Test reale disponibile in produzione (IS_DEMO: false).';
}

// ── AGENTI ────────────────────────────────────────────────────────────
async function pingAgente(agentId, updatePage) {
  const a = AGENTI.find(x => x.id === agentId);
  if(!a) return;
  const url = a.url ? `${a.url}${a.health}` : `http://localhost:${a.port}${a.health}`;
  let online = false, latency = null;
  try {
    const t0 = performance.now();
    const r = await fetch(url, { signal: AbortSignal.timeout(2500) });
    if(r.ok){ latency = Math.round(performance.now()-t0); online=true; }
  } catch {}
  S.agentStatus[agentId] = { online, latency };
  if(updatePage) {
    renderAgentsList();
    addLog(agentId, online?'ok':'warn', a.lbl+': '+(online?`online ${latency}ms`:'offline'));
  }
  return online;
}

async function pingAgenti() {
  await Promise.all(AGENTI.map(a => pingAgente(a.id, false)));
  S.agentStatus.lastPing = new Date().toISOString();
  if($('cr-last-ping')) $('cr-last-ping').textContent = 'Ultimo ping: '+new Date().toLocaleTimeString('it-IT');
  renderAgentsList();
  addLog('mgr','ok','Ping agenti completato');
}

function renderAgentPage(agentId) {
  const a = AGENTI.find(x => x.id === agentId);
  if(!a) return;
  const st = S.agentStatus[agentId] || {};
  const asStatus = $(`as-status-${agentId}`);
  if(asStatus) asStatus.textContent = st.online===true?'✅ Online':st.online===false?'❌ Offline':'⏳ Non verificato';
  const asLat = $(`as-lat-${agentId}`);
  if(asLat) asLat.textContent = st.latency ? st.latency+'ms' : '—';
  const logCont = $(`agent-log-${agentId}`);
  if(logCont) {
    clr(logCont);
    S.logs.filter(l=>l.area===agentId).slice(0,20).forEach(l => logCont.appendChild(buildLogRow(l)));
  }
}

// ── CMD BAR ───────────────────────────────────────────────────────────
async function inviaCmd() {
  const inp = $('cmd-inp');
  if(!inp || !inp.value.trim()) return;
  const cmd = inp.value.trim();
  inp.value = '';
  addLog('cmd','info','CMD: '+cmd);
  toast('⚡ Comando inviato');
  // Tenta invio al backend Social se disponibile
  try {
    await fetch(BACKEND+'/api/social/genera', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ argomento:cmd, piattaforma:'LINKEDIN' }),
      signal: AbortSignal.timeout(8000)
    });
    toast('✅ Backend ha elaborato il comando');
  } catch { toast('⚡ Comando in coda locale'); }
}

// ── TIMERS ────────────────────────────────────────────────────────────
function startTimers() {
  // Clock
  setInterval(() => {
    const cl = $('hdr-clock');
    if(cl) cl.textContent = new Date().toLocaleTimeString('it-IT');
  }, 1000);
  // Session timeout
  setInterval(() => {
    if(!S.auth) return;
    const rem = S.sessionExp - Date.now();
    if(rem <= 0) { endSession(); return; }
    if(rem < 60000 && !S.warnShown) {
      S.warnShown = true;
      toast('⚠️ Sessione in scadenza — clicca per prolungare');
    }
    // Badge
    const badge = $('hdr-session');
    if(badge) {
      if(rem < 120000){ badge.textContent='⚠ SESSIONE IN SCADENZA'; badge.className='hdr-badge hdr-warn'; }
      else { badge.textContent='● SESSIONE ATTIVA'; badge.className='hdr-badge hdr-ok'; }
    }
  }, 5000);
  // Auto-ping ogni 60s
  setInterval(() => {
    pingAgenti();
    pingAll();
  }, 60000);
}

// ── BOOT ──────────────────────────────────────────────────────────────
function boot() {
  loadAudit();
  loadApiCfg();
  if(loadSession()) {
    buildApp();
  } else {
    showLogin();
  }
}

boot();

</script>
